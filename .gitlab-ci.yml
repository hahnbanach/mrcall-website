stages:
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  SCW_REGION: fr-par
  SCW_REGISTRY: rg.fr-par.scw.cloud
  IMAGE_NAME: "${SCW_REGISTRY}/${SCW_REGISTRY_NAMESPACE}/mrcall-website"
  IMAGE_TAG: "${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"

# ─── Build & Push Docker Image ─────────────────────────────────

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "${SCW_SECRET_KEY}" | docker login ${SCW_REGISTRY} -u nologin --password-stdin
  script:
    - docker build --platform linux/amd64 -t ${IMAGE_NAME}:${IMAGE_TAG} .
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}-latest
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}
    - docker push ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}-latest
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "production"

# ─── Deploy to Dev ──────────────────────────────────────────────

deploy-dev:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - |
      echo "Deploying ${IMAGE_NAME}:${IMAGE_TAG} to dev..."

      # Update the container to use the new image
      curl --fail --request PATCH \
        --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
        --header "Content-Type: application/json" \
        --data "{\"registry_image\": \"${IMAGE_NAME}:${IMAGE_TAG}\"}" \
        "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_DEV}"

      # Trigger deployment
      curl --fail --request POST \
        --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
        --header "Content-Type: application/json" \
        --data '{}' \
        "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_DEV}/deploy"

      echo "Deploy triggered. Waiting for container to become ready..."

      # Poll for readiness (max 5 minutes)
      for i in $(seq 1 30); do
        STATUS=$(curl -s \
          --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
          "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_DEV}" \
          | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
        echo "  Attempt ${i}/30: status=${STATUS}"
        if [ "${STATUS}" = "ready" ]; then
          echo "Container is ready!"
          exit 0
        fi
        if echo "${STATUS}" | grep -qi "error"; then
          echo "Deployment failed with status: ${STATUS}"
          exit 1
        fi
        sleep 10
      done
      echo "Timeout waiting for container to become ready"
      exit 1
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: dev
    url: https://dev.mrcall.ai

# ─── Deploy to Production ───────────────────────────────────────

deploy-production:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - |
      echo "Deploying ${IMAGE_NAME}:${IMAGE_TAG} to production..."

      # Update the container to use the new image
      curl --fail --request PATCH \
        --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
        --header "Content-Type: application/json" \
        --data "{\"registry_image\": \"${IMAGE_NAME}:${IMAGE_TAG}\"}" \
        "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_PROD}"

      # Trigger deployment
      curl --fail --request POST \
        --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
        --header "Content-Type: application/json" \
        --data '{}' \
        "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_PROD}/deploy"

      echo "Deploy triggered. Waiting for container to become ready..."

      # Poll for readiness (max 5 minutes)
      for i in $(seq 1 30); do
        STATUS=$(curl -s \
          --header "X-Auth-Token: ${SCW_SECRET_KEY}" \
          "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID_PROD}" \
          | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
        echo "  Attempt ${i}/30: status=${STATUS}"
        if [ "${STATUS}" = "ready" ]; then
          echo "Container is ready!"
          exit 0
        fi
        if echo "${STATUS}" | grep -qi "error"; then
          echo "Deployment failed with status: ${STATUS}"
          exit 1
        fi
        sleep 10
      done
      echo "Timeout waiting for container to become ready"
      exit 1
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
  environment:
    name: production
    url: https://mrcall.ai
